<h1>Saved VR List</h1>

<ul class="headsets">
    <li *ngFor="let headset of headsetsList" [ngClass]="getStatusClass(headset.status)">
        
        <div class="image-container-button-settings">
            <button (click)="openEditModal(headset)">
                <img [src]="imagePathSettings" alt="Click here to edit VRHeadset settings">
            </button>
        </div>

        <div class="image-container-vr">
            <img [src]="headset.isOnline ? imagePathQuest3 : imagePathQuest3Grey" alt="MetaQuest3">
        </div>

        <div class="vrinfo1">
            <div class="name">
                <span>{{ headset.name }}</span>
            </div>
            
            <div class="ipadress">
                <span>{{ headset.ipAddress }}</span>
            </div>
        
        </div>
        <div class="vrinfo2">
            <div class="port">
                <span>{{ headset.port }}</span>
            </div>
    
            <div class="status">
                <span>{{ headset.status }}</span>    
            </div>
        </div>

        <div class="image-container-button">
            <button (click)="sendDownloadAssetsOSC(headset)">
                <img [src]="imagePathUpload" alt="Click here to download VRHeadset assets">
            </button>
        </div>
    </li>
</ul>

<!-- Modal for editing headset -->
<div class="modal" [class.open]="isEditModalOpen">
    <h2>Edit VR Headset</h2>
    <form (ngSubmit)="saveEditedHeadset()">
        <label for="editIpAddress">IP Address:</label>
        <input type="text" id="editIpAddress" [(ngModel)]="editedHeadset.ipAddress" name="editIpAddress" required>
        <br>
        <label for="editPort">Port:</label>
        <input type="text" id="editPort" [(ngModel)]="editedHeadset.port" name="editPort" required>
        <br>
        <label for="editName">Name:</label>
        <input type="text" id="editName" [(ngModel)]="editedHeadset.name" name="editName" required>
        <br>
        <button type="submit">Save Changes</button>
        <button type="button" (click)="closeEditModal()">Cancel</button>
    </form>
</div>
